<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texas Ranchers — Revenue & Membership</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @font-face{font-family:"Solano Gothic";src:url("fonts/SolanoGothicMVB-Lt.otf") format("opentype");font-weight:300;font-style:normal;font-display:swap}
  @font-face{font-family:"Solano Gothic";src:url("fonts/SolanoGothicMVB-Rg.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:"Solano Gothic";src:url("fonts/SolanoGothicMVB-Md.otf") format("opentype");font-weight:500;font-style:normal;font-display:swap}
  @font-face{font-family:"Solano Gothic";src:url("fonts/SolanoGothicMVB-Sb.otf") format("opentype");font-weight:600;font-style:normal;font-display:swap}
  @font-face{font-family:"Solano Gothic";src:url("fonts/SolanoGothicMVB-Bd.otf") format("opentype");font-weight:700;font-style:normal;font-display:swap}
  :root{
    --bg:#002A3A;--panel:#053744;--panel-2:#0A4252;--line:#1A5060;
    --red:#E02826;--red-soft:#F26A5A;--bone:#E7E4DD;--bone-dim:#93A9B1;
    --green:#6FBB97;--ink-dim:#6E8C97;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--bone);font-family:"Solano Gothic",sans-serif;font-weight:500;line-height:1.45;padding:0 0 64px}
  .wrap{max-width:1180px;margin:0 auto;padding:0 28px}
  header{border-bottom:1px solid #D2CCBF;background:var(--bone);position:sticky;top:0;z-index:10}
  .hbar{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:16px 28px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;text-decoration:none}
  .brand img{height:38px;width:auto;display:block}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header select,header .glink,header .toggle{background:transparent;color:var(--bg);border-color:rgba(0,42,58,.22)}
  header .glink{color:#3B5A64}
  header .glink:hover{color:var(--bg);border-color:var(--red)}
  header .toggle input{accent-color:var(--red)}
  select,.glink{background:var(--panel-2);color:var(--bone);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13.5px;font-family:inherit;cursor:pointer}
  .toggle{display:flex;align-items:center;gap:8px;font-size:13.5px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--red);cursor:pointer}
  .glink{text-decoration:none;color:var(--bone-dim)}
  .glink:hover{color:var(--bone);border-color:var(--red)}
  .stamp{color:var(--ink-dim);font-size:12px}
  .eyebrow{display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.18em;font-size:15px;font-weight:700;color:var(--bone-dim);margin:38px 0 14px}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
  .eyebrow .tag{color:var(--red);font-family:"Solano Gothic",sans-serif;font-weight:800;font-size:21px;letter-spacing:.14em}
  .hero{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px}
  .hero-ytd{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:22px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .15s}
  .stat:hover{border-color:var(--red)}
  .stat .k{font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-dim);font-weight:600}
  .stat .v{font-size:36px;font-weight:800;letter-spacing:-.02em;margin-top:8px;font-variant-numeric:tabular-nums}
  .delta{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;margin-top:8px}
  .delta.up{color:var(--green)}.delta.dn{color:var(--red-soft)}
  .delta .mo{color:var(--ink-dim);font-weight:500}
  .ytd{display:flex;align-items:stretch;flex-wrap:wrap;margin-top:14px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px 6px}
  .ytd-tag{font-size:15px;letter-spacing:.18em;text-transform:uppercase;font-weight:800;color:var(--red);padding:0 18px;border-right:1px solid var(--line);display:flex;align-items:center;line-height:1.2}
  .ytd-item{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;flex:1;padding:2px 12px;border-right:1px solid var(--line);cursor:pointer}
  .ytd-item:last-child{border-right:none}
  .ytd-item:hover .yv{color:var(--red-soft)}
  .yl{font-size:16px;letter-spacing:.09em;text-transform:uppercase;color:var(--bone-dim);font-weight:600}
  .yv{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:3px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px}
  .panel.center{border-color:rgba(224,40,38,.35);box-shadow:0 0 0 1px rgba(224,40,38,.14),0 18px 40px -28px rgba(224,40,38,.5)}
  .ptitle{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:4px}
  .ptitle h3{font-size:26px;font-weight:800;font-family:"Solano Gothic",sans-serif;letter-spacing:.06em;text-transform:uppercase}
  .ptitle .sub{font-size:13px;color:var(--ink-dim)}
  .callout{font-size:13px;background:rgba(224,40,38,.08);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:10px 14px;margin:12px 0 16px;line-height:1.6}
  .callout b{color:var(--red-soft)}
  .callout.neutral{background:rgba(245,240,232,.04);border-left-color:var(--bone-dim)}
  .chart-host{position:relative;width:100%}
  .grid-2{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;margin-top:14px}
  .grid-ops{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
  .tier-row{display:grid;grid-template-columns:180px 1fr;gap:18px;align-items:center;margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}
  .tier-chips{display:flex;gap:10px;flex-wrap:wrap}
  .tchip{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 14px;cursor:pointer;min-width:120px;transition:border-color .15s}
  .tchip:hover{border-color:var(--red)}
  .tchip .tn{font-size:12px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.08em;font-weight:600;display:flex;align-items:center;gap:6px}
  .tchip .dot{width:9px;height:9px;border-radius:50%}
  .tchip .tv{font-size:25px;font-weight:800;margin-top:5px}
  .tchip .tm{font-size:12px;color:var(--ink-dim);margin-top:2px}
  .mo-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .mo-btn{background:var(--panel-2);border:1px solid var(--line);border-radius:6px;color:var(--bone-dim);font-size:12px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:border-color .15s}
  .mo-btn:hover{border-color:var(--red);color:var(--bone)}
  .prod-list{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .prow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s}
  .prow:hover{background:var(--panel-2)}
  .prow .nm{font-size:14px}
  .prow .amt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
  .bar{grid-column:1/3;height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--red-soft));border-radius:3px}
  .hint{font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:5px}
  .hint::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--red);opacity:.7}
  .note{color:var(--ink-dim);font-size:12px;margin-top:10px;font-style:italic}
  footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);color:var(--ink-dim);font-size:13px}
  /* Password screen */
  .pw-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
  .pw-box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:36px 32px;width:360px}
  .pw-box .eye{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--red);font-weight:800;margin-bottom:8px}
  .pw-box h2{font-size:27px;font-weight:800;margin-bottom:4px}
  .pw-box p{font-size:14px;color:var(--bone-dim);margin-bottom:24px}
  .pw-box input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--bone);padding:10px 14px;font-size:15px;font-family:inherit;margin-bottom:12px}
  .pw-box input:focus{outline:none;border-color:var(--red)}
  .pw-box button{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:11px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.04em}
  .pw-box button:hover{background:var(--red-soft)}
  .pw-err{color:var(--red-soft);font-size:12px;margin-top:8px;display:none}
  /* Loading */
  .loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--bone-dim);font-size:14px;gap:10px}
  .spinner{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* Backdrop + Drawer */
  .backdrop{position:fixed;inset:0;background:rgba(6,7,8,.65);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
  .backdrop.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(520px,93vw);background:var(--panel);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:51;display:flex;flex-direction:column;box-shadow:-30px 0 60px -30px rgba(0,0,0,.7)}
  .drawer.open{transform:translateX(0)}
  .dhead{padding:22px 24px 16px;border-bottom:1px solid var(--line);position:relative}
  .dhead .deye{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--red);font-weight:700}
  .dhead h2{font-size:23px;font-weight:800;margin-top:6px}
  .dclose{position:absolute;top:18px;right:18px;background:var(--panel-2);border:1px solid var(--line);color:var(--bone-dim);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
  .dclose:hover{border-color:var(--red);color:var(--bone)}
  .dbody{padding:20px 24px;overflow-y:auto;flex:1}
  .dchips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .dchip{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;flex:1;min-width:90px}
  .dchip .cl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--bone-dim);font-weight:600}
  .dchip .cv{font-size:21px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
  .dtl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-dim);font-weight:700;margin:6px 0 10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--ink-dim);font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:8px;border-bottom:1px solid var(--line)}
  td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-variant-numeric:tabular-nums}
  tr:hover td{background:rgba(255,255,255,.02)}
  .empty{color:var(--ink-dim);font-size:14px;padding:24px 4px;text-align:center}
  @media(max-width:900px){.hero,.hero-ytd{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-ops,.tier-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div class="pw-screen" id="pwScreen">
  <div class="pw-box">
    <div class="eye">Texas Ranchers</div>
    <h2>Revenue Dashboard</h2>
    <p>Enter the access password to continue.</p>
    <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Enter</button>
    <div class="pw-err" id="pwErr">Incorrect password.</div>
  </div>
</div>

<!-- MAIN APP (hidden until authenticated) -->
<div id="app" style="display:none">
  <header>
    <div class="wrap hbar">
      <a class="brand" href="#"><img src="ranchers-wordmark.svg" alt="Texas Ranchers"></a>
      <div class="controls">
        <label class="toggle"><input type="checkbox" id="exInternal"> Exclude internal</label>
        <a class="glink" href="https://docs.google.com/spreadsheets/d/1_2yQg56wqCuBA4WOyj4JrWyOLQeQR-3IO1Ju7V96y_g" target="_blank">View in Sheets ↗</a>
      </div>
    </div>
  </header>

  <div class="wrap" id="mainContent">
    <div class="loading"><div class="spinner"></div> Loading live data…</div>
  </div>
</div>

<!-- BACKDROP + DRAWER -->
<div class="backdrop" id="backdrop" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="dhead">
    <div class="deye" id="dEye"></div>
    <h2 id="dTitle"></h2>
    <button class="dclose" onclick="closeDrawer()">✕</button>
  </div>
  <div class="dbody">
    <div class="dchips" id="dChips"></div>
    <div class="dtl">Transactions</div>
    <div id="dTable"></div>
  </div>
</aside>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const API_KEY   = "AIzaSyCdRB6S_aaOJP1IhZPQranH6nv_JCFyB48";
const SHEET_ID  = "1_2yQg56wqCuBA4WOyj4JrWyOLQeQR-3IO1Ju7V96y_g";
const PASSWORD  = "ranchers2026";
const RED="#E02826",REDSOFT="#F26A5A",BONE="#E7E4DD",BONEDIM="#93A9B1",GREEN="#6FBB97",LINE="#1A5060",PANEL2="#0A4252";

// ── PASSWORD ────────────────────────────────────────────────────────────────
function checkPw(){
  const v=document.getElementById('pwInput').value;
  if(v===PASSWORD){
    document.getElementById('pwScreen').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  } else {
    document.getElementById('pwErr').style.display='block';
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});

// ── DATA ────────────────────────────────────────────────────────────────────
let SUMMARY=[], ORDERS=[], MONTHS=[], currentMonth=null, priorMonth=null;
let summaryHeaders=[], ordersHeaders=[];

async function fetchSheet(range){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error(`Sheet fetch failed: ${r.status}`);
  const d=await r.json();
  return d.values||[];
}

function parseRows(values){
  if(!values.length) return {headers:[],rows:[]};
  const headers=values[0].map(h=>(h||'').trim());
  const rows=values.slice(1).map(r=>{
    const obj={};
    headers.forEach((h,i)=>obj[h]=(r[i]||'').trim());
    return obj;
  });
  return {headers,rows};
}

function parseDate(str){
  if(!str) return null;
  const d=new Date(str);
  return isNaN(d)?null:d;
}

function monthStart(dateStr){
  const d=parseDate(dateStr);
  if(!d) return null;
  return new Date(d.getFullYear(),d.getMonth(),1);
}

function fmtMonth(d){
  if(!d) return '';
  return d.toLocaleDateString('en-US',{month:'short',year:'numeric'});
}

function fmtCurrency(v){
  const n=parseFloat(String(v).replace(/[$,]/g,''));
  if(isNaN(n)) return '$0';
  return '$'+Math.round(n).toLocaleString('en-US');
}

function fmtDelta(curr,prior){
  if(!prior||prior===0) return {html:'—',cls:''};
  const pct=((curr-prior)/prior)*100;
  const arrow=pct>=0?'▲':'▼';
  const cls=pct>=0?'up':'dn';
  return {html:`${arrow} ${Math.round(Math.abs(pct))}% <span class="mo">vs prior mo</span>`,cls};
}

function getSummaryVal(col,monthTs){
  const row=SUMMARY.find(r=>{
    const d=parseDate(r['Month Start']);
    return d && d.getFullYear()===monthTs.getFullYear() && d.getMonth()===monthTs.getMonth();
  });
  if(!row||!(col in row)) return 0;
  return parseFloat(String(row[col]).replace(/[$,]/g,''))||0;
}

async function loadData(){
  try{
    const [sumVals,ordVals]=await Promise.all([
      fetchSheet('Monthly Summary!A:P'),
      fetchSheet('Orders!A:BJ')
    ]);
    const sum=parseRows(sumVals);
    const ord=parseRows(ordVals);
    SUMMARY=sum.rows;
    ORDERS=ord.rows;
    summaryHeaders=sum.headers;
    ordersHeaders=ord.headers;

    // Build available months list (Jan 2025 up to current month)
    const now=new Date();
    MONTHS=SUMMARY
      .filter(r=>r['Month Start']&&r['Month Label'])
      .map(r=>({ts:parseDate(r['Month Start']),label:r['Month Label']}))
      .filter(r=>r.ts&&r.ts.getUTCFullYear()===2026&&r.ts.getUTCMonth()<=now.getUTCMonth())
      .sort((a,b)=>b.ts-a.ts);

    // Lock to last full calendar month by default
    currentMonth=new Date(now.getFullYear(),now.getMonth()-1,1);
    priorMonth=new Date(now.getFullYear(),now.getMonth()-2,1);

    document.getElementById('exInternal').addEventListener('change',renderDashboard);
    renderDashboard();
  } catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="loading" style="color:var(--red-soft)">Failed to load data: ${e.message}</div>`;
  }
}

// ── FILTERED ORDERS ─────────────────────────────────────────────────────────
function filteredOrders(){
  const excl=document.getElementById('exInternal').checked;
  return ORDERS.filter(r=>!excl || r['Segment']==='Customer' || (r['Email']&&!r['Email'].includes('@txranchers.com')));
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderDashboard(){
  const cm=currentMonth, pm=priorMonth;
  const fOrders=filteredOrders();

  // Helper: orders in a month
  function ordersInMonth(ts){
    return fOrders.filter(r=>{
      const d=monthStart(r['Created At']);
      return d && d.getTime()===ts.getTime();
    });
  }

  const cmOrders=ordersInMonth(cm);
  const pmOrders=pm?ordersInMonth(pm):[];

  function sumField(rows,field){
    return rows.reduce((acc,r)=>acc+(parseFloat(String(r[field]).replace(/[$,]/g,''))||0),0);
  }

  // Current month metrics
  const merchCm=cmOrders.filter(r=>r['Product Category']==='Merchandise');
  const memCm  =cmOrders.filter(r=>r['Product Category']==='Membership');
  const merchPm=pmOrders.filter(r=>r['Product Category']==='Merchandise');
  const memPm  =pmOrders.filter(r=>r['Product Category']==='Membership');

  const merchRev =sumField(merchCm,'Adjusted Revenue');
  const merchRevP=sumField(merchPm,'Adjusted Revenue');
  const mrr      =sumField(memCm,'Adjusted Revenue');
  const mrrP     =sumField(memPm,'Adjusted Revenue');
  const totalRev =merchRev+mrr;
  const totalRevP=merchRevP+mrrP;

  // Active members: distinct emails with membership charge this month
  const activeMem=new Set(memCm.map(r=>r['Email'].toLowerCase())).size;
  const activeMemP=pm?new Set(memPm.map(r=>r['Email'].toLowerCase())).size:0;
  const newMem=memCm.filter(r=>r['Subscription Event']==='First Order').length;
  const newMemP=pm?memPm.filter(r=>r['Subscription Event']==='First Order').length:0;

  // YTD — include current (in-progress) month
  const ytdStart=new Date(cm.getFullYear(),0,1);
  const ytdNow=new Date();
  const ytdEnd=new Date(ytdNow.getFullYear(),ytdNow.getMonth(),1);
  const ytdOrders=fOrders.filter(r=>{
    const d=monthStart(r['Created At']);
    return d && d>=ytdStart && d<=ytdEnd;
  });
  const ytdMerch=sumField(ytdOrders.filter(r=>r['Product Category']==='Merchandise'),'Adjusted Revenue');
  const ytdMem  =sumField(ytdOrders.filter(r=>r['Product Category']==='Membership'),'Adjusted Revenue');
  const ytdTotal=ytdMerch+ytdMem;
  const ytdMerchOrders=new Set(ytdOrders.filter(r=>r['Product Category']==='Merchandise').map(r=>r['Order Name'])).size;

  // Summary months for charts
  const summaryMonths=SUMMARY.map(r=>({
    ts:parseDate(r['Month Start']),
    label:r['Month Label']||'',
    merch:parseFloat(String(r['Merch Revenue']).replace(/[$,]/g,''))||0,
    mem:parseFloat(String(r['Membership Revenue']).replace(/[$,]/g,''))||0,
    active:parseFloat(r['Active Members'])||0,
    newM:parseFloat(r['New Members'])||0,
    mrr:parseFloat(String(r['Membership Revenue']).replace(/[$,]/g,''))||0
  })).filter(r=>r.ts).sort((a,b)=>a.ts-b.ts);

  const d1=fmtDelta(totalRev,totalRevP);
  const d2=fmtDelta(mrr,mrrP);
  const d3=fmtDelta(activeMem,activeMemP);
  const d4=fmtDelta(newMem,newMemP);

  // Tier counts
  const adultCount=new Set(memCm.filter(r=>r['Membership Tier']==='Adult').map(r=>r['Email'].toLowerCase())).size;
  const juniorCount=new Set(memCm.filter(r=>r['Membership Tier']==='Junior').map(r=>r['Email'].toLowerCase())).size;
  const seniorCount=new Set(memCm.filter(r=>r['Membership Tier']==='Senior').map(r=>r['Email'].toLowerCase())).size;
  const adultMrr=adultCount*150, juniorMrr=juniorCount*160, seniorMrr=seniorCount*150;

  // Top products — 2026 only
  const merch2026=fOrders.filter(r=>r['Product Category']==='Merchandise'&&(parseDate(r['Created At'])||new Date(0)).getFullYear()===cm.getFullYear());
  const prodMap={};
  merch2026.forEach(r=>{
    const n=r['Line Item Title'],v=parseFloat(String(r['Adjusted Revenue']).replace(/[$,]/g,''))||0;
    if(n) prodMap[n]=(prodMap[n]||0)+v;
  });
  const topProds=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxProd=topProds[0]?topProds[0][1]:1;

  // Category mix — 2026 only
  const catMap={};
  merch2026.forEach(r=>{
    const c=r['Merch Bucket']||'Other',v=parseFloat(String(r['Adjusted Revenue']).replace(/[$,]/g,''))||0;
    catMap[c]=(catMap[c]||0)+v;
  });
  const catEntries=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  document.getElementById('mainContent').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:26px;flex-wrap:wrap;gap:10px">
    <div style="font-size:15px;letter-spacing:.2em;text-transform:uppercase;color:var(--bone-dim);font-weight:700">2026 Year to Date</div>
    <div class="stamp">Live data · refreshed on load</div>
  </div>

  <!-- YTD (big, primary) -->
  <section class="hero-ytd">
    <div class="stat" onclick="openYtdDrawer('total')">
      <div class="k">YTD Total Revenue</div><div class="v">${fmtCurrency(ytdTotal)}</div>
    </div>
    <div class="stat" onclick="openYtdDrawer('merch')">
      <div class="k">YTD Merch</div><div class="v">${fmtCurrency(ytdMerch)}</div>
    </div>
    <div class="stat" onclick="openYtdDrawer('membership')">
      <div class="k">YTD Membership</div><div class="v">${fmtCurrency(ytdMem)}</div>
    </div>
    <div class="stat" onclick="openYtdDrawer('active')">
      <div class="k">Active Members</div><div class="v">${activeMem}</div>
    </div>
    <div class="stat" onclick="openYtdDrawer('orders')">
      <div class="k">YTD Merch Orders</div><div class="v">${ytdMerchOrders}</div>
    </div>
  </section>

  <!-- MONTHLY COMPARISON STRIP -->
  <section class="ytd" style="margin-top:14px">
    <div class="ytd-tag" style="padding:4px 14px;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:3px">
      <select id="monthCompSel" style="background:transparent;color:var(--red);border:none;font-weight:800;font-size:16px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;outline:none;font-family:inherit;text-align:center;text-align-last:center">${MONTHS.map(m=>{const sel=m.ts.getUTCFullYear()===cm.getFullYear()&&m.ts.getUTCMonth()===cm.getMonth()?'selected':'';return `<option value="${m.ts.getUTCFullYear()}-${m.ts.getUTCMonth()}" ${sel} style="background:var(--panel);color:var(--bone)">${m.label}</option>`;}).join('')}</select>
      <div style="font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim);white-space:nowrap">vs ${pm?fmtMonth(pm):'prior mo'}</div>
    </div>
    <div class="ytd-item" onclick="openCardDrawer('totalRev')">
      <span class="yl">Total Revenue</span><span class="yv">${fmtCurrency(totalRev)}</span>
      <div class="delta ${d1.cls}" style="font-size:10.5px;margin-top:3px">${d1.html}</div>
    </div>
    <div class="ytd-item" onclick="openCardDrawer('mrr')">
      <span class="yl">MRR</span><span class="yv">${fmtCurrency(mrr)}</span>
      <div class="delta ${d2.cls}" style="font-size:10.5px;margin-top:3px">${d2.html}</div>
    </div>
    <div class="ytd-item" onclick="openCardDrawer('active')">
      <span class="yl">Active Members</span><span class="yv">${activeMem}</span>
      <div class="delta ${d3.cls}" style="font-size:10.5px;margin-top:3px">${d3.html}</div>
    </div>
    <div class="ytd-item" onclick="openCardDrawer('new')">
      <span class="yl">New Members</span><span class="yv">${newMem}</span>
      <div class="delta ${d4.cls}" style="font-size:10.5px;margin-top:3px">${d4.html}</div>
    </div>
  </section>

  <!-- MEMBERSHIP HEALTH -->
  <div class="eyebrow"><span class="tag">Membership Overview</span></div>
  <section class="panel center">
    <div class="ptitle"><h3>TRAP recurring membership</h3><span class="hint">Click a dot to see that month's members</span></div>
    <div class="grid-2">
      <div class="chart-host" style="height:280px"><canvas id="memChart"></canvas></div>
      <div class="chart-host" style="height:280px"><canvas id="mrrChart"></canvas></div>
    </div>
    <div class="tier-row">
      <div class="chart-host" style="height:160px"><canvas id="tierChart"></canvas></div>
      <div class="tier-chips">
        <div class="tchip" onclick="openTierDrawer('Adult')">
          <div class="tn"><span class="dot" style="background:var(--red)"></span>Adult</div>
          <div class="tv">${adultCount}</div><div class="tm">${fmtCurrency(adultMrr)} MRR · $150</div>
        </div>
        <div class="tchip" onclick="openTierDrawer('Junior')">
          <div class="tn"><span class="dot" style="background:#E8836F"></span>Junior</div>
          <div class="tv">${juniorCount}</div><div class="tm">${fmtCurrency(juniorMrr)} MRR · $160</div>
        </div>
        <div class="tchip" onclick="openTierDrawer('Senior')">
          <div class="tn"><span class="dot" style="background:#C9A24B"></span>Senior</div>
          <div class="tv">${seniorCount}</div><div class="tm">${seniorCount?fmtCurrency(seniorMrr)+' MRR · $150':'no members yet'}</div>
        </div>
      </div>
    </div>
    <div class="note">Membership status derived from Shopify subscription orders. Dips may include billing-cycle timing, not only cancellations.</div>
  </section>

  <!-- REVENUE TREND -->
  <div class="eyebrow"><span class="tag">Total Revenue</span> Membership + Merchandise Combined</div>
  <section class="panel">
    <div class="ptitle"><h3>Monthly revenue by stream</h3><span class="sub">Merch + membership · 2026</span></div>
<div class="chart-host" style="height:300px"><canvas id="revChart"></canvas></div>
  </section>

  <!-- OPERATIONS -->
  <div class="eyebrow"><span class="tag">Top Products &amp; Categories</span></div>
  <div class="grid-ops">
    <section class="panel">
      <div class="ptitle"><h3>Top products</h3><span class="hint">Click any product</span></div>
      <div class="prod-list" id="prodList"></div>
      <div class="note">2026 · customer orders${document.getElementById('exInternal').checked?' only':' (includes internal)'}</div>
    </section>
    <section class="panel">
      <div class="ptitle"><h3>Category mix</h3><span class="hint">Click a slice</span></div>
      <div class="chart-host" style="height:260px;margin-top:8px"><canvas id="catChart"></canvas></div>
    </section>
  </div>

  <footer>Data source: Shopify online sales</footer>
  `;

  // Charts
  Chart.defaults.color=BONEDIM;
  Chart.defaults.font.family="Inter, Helvetica Neue, Arial, sans-serif";
  Chart.defaults.font.size=11;
  const gridX={grid:{display:false},border:{color:LINE}};
  const gridY={grid:{color:"rgba(255,255,255,.04)"},border:{display:false}};
  const mem2026=summaryMonths.filter(m=>m.ts.getUTCFullYear()>=2026);
  const memLabels=mem2026.map(m=>m.label||fmtMonth(m.ts));
  const activeVals=mem2026.map(m=>m.active);
  const newVals=mem2026.map(m=>m.newM);
  const mrrVals=mem2026.map(m=>m.mrr);
  const onDotClick=(e,el)=>{if(el.length){const m=mem2026[el[0].index];if(m)openMonthDrawer(m.ts.getUTCFullYear(),m.ts.getUTCMonth());}};
  const dotCursor=(e,el)=>{e.native.target.style.cursor=el.length?'pointer':'default';};

  new Chart(document.getElementById('memChart'),{
    data:{labels:memLabels,datasets:[
      {type:'bar',label:'New signups',data:newVals,backgroundColor:"rgba(200,16,46,.32)",borderColor:RED,borderWidth:1,borderRadius:3,order:2,barThickness:26},
      {type:'line',label:'Active members',data:activeVals,borderColor:REDSOFT,backgroundColor:REDSOFT,borderWidth:2.5,tension:.3,pointRadius:5,pointBackgroundColor:REDSOFT,order:1}
    ]},
    options:{maintainAspectRatio:false,responsive:true,
      onClick:onDotClick,onHover:dotCursor,
      plugins:{legend:{labels:{boxWidth:10,usePointStyle:true},position:'top',align:'end'}},
      scales:{x:gridX,y:{...gridY,beginAtZero:true,ticks:{precision:0}}}}
  });

  new Chart(document.getElementById('mrrChart'),{
    type:'line',
    data:{labels:memLabels,datasets:[{label:'MRR',data:mrrVals,borderColor:BONE,backgroundColor:"rgba(245,240,232,.06)",fill:true,borderWidth:2,tension:.3,pointRadius:5,pointBackgroundColor:BONE}]},
    options:{maintainAspectRatio:false,responsive:true,
      onClick:onDotClick,onHover:dotCursor,
      plugins:{legend:{display:false},title:{display:true,text:'Monthly Recurring Revenue',align:'start',color:BONEDIM,font:{size:11,weight:'600'}}},
      scales:{x:gridX,y:{...gridY,ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k'}}}}
  });

  const revMonths=summaryMonths.filter(m=>m.ts.getUTCFullYear()===cm.getFullYear());
  const revLabels=revMonths.map(m=>m.label||fmtMonth(m.ts));
  new Chart(document.getElementById('revChart'),{
    type:'bar',
    data:{labels:revLabels,datasets:[
      {label:'Merch',data:revMonths.map(m=>m.merch),backgroundColor:"rgba(245,240,232,.55)",stack:'s',borderRadius:2},
      {label:'Membership',data:revMonths.map(m=>m.mem),backgroundColor:RED,stack:'s',borderRadius:2}
    ]},
    options:{maintainAspectRatio:false,responsive:true,
      plugins:{
        legend:{labels:{boxWidth:10},position:'top',align:'end'},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: $${Math.round(ctx.parsed.y).toLocaleString('en-US')}`}}
      },
      scales:{x:{...gridX,ticks:{maxRotation:0,autoSkip:true,font:{size:9.5}}},y:{...gridY,ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k'}}}}
  });

  const catColors=[RED,REDSOFT,"#7E1220","#E8836F","#C9A24B","#5FB87A","#5B6BB0","#6E727A"];
  const catTotal=catEntries.reduce((s,c)=>s+c[1],0);
  const catChart=new Chart(document.getElementById('catChart'),{
    type:'doughnut',
    data:{labels:catEntries.map(c=>c[0]),datasets:[{data:catEntries.map(c=>c[1]),backgroundColor:catColors.slice(0,catEntries.length),borderColor:"#16181C",borderWidth:2}]},
    options:{maintainAspectRatio:false,responsive:true,cutout:'62%',
      onClick:(e,el)=>{if(el.length)openCategoryDrawer(catEntries[el[0].index][0]);},
      onHover:(e,el)=>{e.native.target.style.cursor=el.length?'pointer':'default';},
      plugins:{legend:{position:'right',labels:{boxWidth:10,padding:10,font:{size:11},color:BONEDIM,
        generateLabels:()=>catEntries.map((c,i)=>({
          text:`${c[0]}   ${fmtCurrency(c[1])}  (${Math.round(c[1]/catTotal*100)}%)`,
          fillStyle:catColors[i%catColors.length],
          fontColor:BONEDIM,
          strokeStyle:'#141820',lineWidth:2,hidden:false,index:i
        }))
      }}}}
  });

  // Top products list
  const prodList=document.getElementById('prodList');
  topProds.forEach(([name,rev])=>{
    const pct=Math.round(rev/maxProd*100);
    const div=document.createElement('div');
    div.className='prow';
    div.innerHTML=`<span class="nm">${name}</span><span class="amt">${fmtCurrency(rev)}</span><span class="bar"><i style="width:${pct}%"></i></span>`;
    div.onclick=()=>openProductDrawer(name);
    prodList.appendChild(div);
  });

  // Month comparison selector
  document.getElementById('monthCompSel').addEventListener('change',function(){
    const [y,mo]=this.value.split('-').map(Number);
    currentMonth=new Date(y,mo,1);
    priorMonth=new Date(y,mo-1,1);
    renderDashboard();
  });

  // Store refs for drawers
  window._state={cm,pm,cmOrders,pmOrders,merchCm,memCm,merchRev,mrr,totalRev,activeMem,newMem,ytdMerch,ytdMem,ytdTotal,ytdMerchOrders,summaryMonths,adultCount,juniorCount,seniorCount,adultMrr,juniorMrr,seniorMrr};
}

// ── DRAWER ENGINE ────────────────────────────────────────────────────────────
function openDrawer(eye,title,chips,cols,rows){
  document.getElementById('dEye').textContent=eye;
  document.getElementById('dTitle').textContent=title;
  document.getElementById('dChips').innerHTML=chips.map(c=>`<div class="dchip"><div class="cl">${c.l}</div><div class="cv">${c.v}</div></div>`).join('');
  if(!rows||!rows.length){
    document.getElementById('dTable').innerHTML=`<div class="empty">No records in this slice.</div>`;
  } else {
    document.getElementById('dTable').innerHTML=
      `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>`+
      `<tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  }
  document.getElementById('drawer').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

function fmtDate(str){const d=parseDate(str);return d?d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';}

// ── DRAWER OPENERS ───────────────────────────────────────────────────────────
function byDateDesc(a,b){return (parseDate(b['Created At'])||0)-(parseDate(a['Created At'])||0);}
function memName(r){return r['Customer Name']||r['Email'];}

function openCardDrawer(key){
  const s=window._state;
  const cm=s.cm, pm=s.pm;
  const label=fmtMonth(cm);
  if(key==='totalRev'){
    const rows=s.cmOrders.slice().sort(byDateDesc).map(r=>[r['Order Name'],fmtDate(r['Created At']),r['Email'],r['Product Category'],fmtCurrency(r['Adjusted Revenue'])]);
    openDrawer(`${label} · All Revenue`,'Total Revenue',[{l:'Total',v:fmtCurrency(s.totalRev)},{l:'Merch',v:fmtCurrency(s.merchRev)},{l:'Membership',v:fmtCurrency(s.mrr)}],['Order','Date','Customer','Type','Revenue'],rows);
  } else if(key==='mrr'){
    const rows=s.memCm.slice().sort(byDateDesc).map(r=>[memName(r),r['Membership Tier'],r['Subscription Event'],fmtCurrency(r['Adjusted Revenue'])]);
    openDrawer(`${label} · Membership`,'MRR',[{l:'MRR',v:fmtCurrency(s.mrr)},{l:'Members',v:String(s.activeMem)}],['Member','Tier','Status','Charge'],rows);
  } else if(key==='active'){
    const rows=s.memCm.slice().sort(byDateDesc).map(r=>[memName(r),r['Membership Tier'],r['Subscription Event'],fmtDate(r['Created At'])]);
    openDrawer(`${label} · Active`,'Active Members',[{l:'Active',v:String(s.activeMem)},{l:'MRR',v:fmtCurrency(s.mrr)}],['Member','Tier','Status','Last Charge'],rows);
  } else if(key==='new'){
    const newRows=s.memCm.filter(r=>r['Subscription Event']==='First Order').sort(byDateDesc).map(r=>[memName(r),r['Membership Tier'],fmtDate(r['Created At'])]);
    openDrawer(`${label} · New Signups`,'New Members',[{l:'New',v:String(s.newMem)},{l:'Month',v:label}],['Member','Tier','Date'],newRows);
  }
}

function openYtdDrawer(key){
  const s=window._state;
  const yr=s.cm.getFullYear();
  const nowUTCMonth=new Date().getUTCMonth();
  const ytdSum=SUMMARY.filter(r=>{
    const d=parseDate(r['Month Start']);
    return d&&d.getUTCFullYear()===yr&&d.getUTCMonth()<=nowUTCMonth;
  }).sort((a,b)=>parseDate(b['Month Start'])-parseDate(a['Month Start']));
  const moLabel=r=>r['Month Label']||fmtMonth(parseDate(r['Month Start']));
  if(key==='total'){
    const rows=ytdSum.map(r=>{
      const m=parseFloat(String(r['Merch Revenue']).replace(/[$,]/g,''))||0;
      const mem=parseFloat(String(r['Membership Revenue']).replace(/[$,]/g,''))||0;
      return [moLabel(r),fmtCurrency(m),fmtCurrency(mem),fmtCurrency(m+mem)];
    });
    openDrawer('2026 YTD · All Streams','Total Revenue',[{l:'Total',v:fmtCurrency(s.ytdTotal)}],['Month','Merch','Membership','Total'],rows);
  } else if(key==='merch'){
    const rows=ytdSum.map(r=>[moLabel(r),fmtCurrency(parseFloat(String(r['Merch Revenue']).replace(/[$,]/g,''))||0),r['Merch Orders']||'—',r['Merch Units']||'—']);
    openDrawer('2026 YTD · Merchandise','Merch Revenue',[{l:'Merch',v:fmtCurrency(s.ytdMerch)},{l:'Orders',v:String(s.ytdMerchOrders)}],['Month','Revenue','Orders','Units'],rows);
  } else if(key==='membership'){
    const rows=ytdSum.map(r=>[moLabel(r),fmtCurrency(parseFloat(String(r['Membership Revenue']).replace(/[$,]/g,''))||0),r['Active Members']||'0',r['New Members']||'0']);
    openDrawer('2026 YTD · TRAP','Membership Revenue',[{l:'Total',v:fmtCurrency(s.ytdMem)},{l:'Active now',v:String(s.activeMem)}],['Month','MRR','Active','New'],rows);
  } else if(key==='active'){
    const rows=s.memCm.map(r=>[memName(r),r['Membership Tier'],r['Subscription Event'],fmtDate(r['Created At'])]);
    openDrawer('Current · Active Members','Active Members',[{l:'Active',v:String(s.activeMem)},{l:'Adult',v:String(s.adultCount)},{l:'Junior',v:String(s.juniorCount)}],['Member','Tier','Status','Last Charge'],rows);
  } else if(key==='orders'){
    const rows=ytdSum.map(r=>{
      const rev=parseFloat(String(r['Merch Revenue']).replace(/[$,]/g,''))||0;
      const ords=parseInt(r['Merch Orders'])||0;
      return [moLabel(r),String(ords),fmtCurrency(rev),ords?fmtCurrency(rev/ords):'—'];
    });
    openDrawer('2026 YTD · Orders','Merch Orders',[{l:'Orders',v:String(s.ytdMerchOrders)},{l:'Revenue',v:fmtCurrency(s.ytdMerch)}],['Month','Orders','Revenue','AOV'],rows);
  }
}

function openTierDrawer(tier){
  const s=window._state;
  const rows=s.memCm.filter(r=>r['Membership Tier']===tier).sort(byDateDesc).map(r=>[memName(r),r['Subscription Event'],fmtDate(r['Created At'])]);
  const count=rows.length, price=tier==='Junior'?160:150;
  openDrawer(`Membership · Tier`,`TRAP ${tier}`,[{l:'Members',v:String(count)},{l:'MRR',v:fmtCurrency(count*price)},{l:'Price',v:`$${price}`}],['Member','Status','Last Charge'],rows);
}

function openMonthDrawer(yr,mo){
  const filtered=ORDERS.filter(r=>{
    const d=parseDate(r['Created At']);
    return d&&d.getFullYear()===yr&&d.getMonth()===mo&&r['Product Category']==='Membership';
  }).sort(byDateDesc);
  const rows=filtered.map(r=>[memName(r),r['Membership Tier'],r['Subscription Event'],fmtDate(r['Created At'])]);
  const label=new Date(yr,mo,15).toLocaleDateString('en-US',{month:'short',year:'numeric'});
  const active=new Set(filtered.map(r=>r['Email'].toLowerCase())).size;
  const newM=filtered.filter(r=>r['Subscription Event']==='First Order').length;
  const mrrVal=filtered.reduce((a,r)=>{
    const price=r['Membership Tier']==='Junior'?160:150;
    return a+price;
  },0);
  openDrawer(`Membership · Month`,label,[{l:'Active',v:String(active)},{l:'New',v:String(newM)},{l:'MRR',v:fmtCurrency(mrrVal)}],['Member','Tier','Status','Date'],rows);
}

function openProductDrawer(name){
  const yr=window._state.cm.getFullYear();
  const rows=ORDERS.filter(r=>r['Line Item Title']===name&&r['Product Category']==='Merchandise'&&(parseDate(r['Created At'])||new Date(0)).getFullYear()===yr)
    .sort(byDateDesc)
    .map(r=>[r['Order Name'],fmtDate(r['Created At']),r['Email'],r['Variant Title'],r['Quantity'],fmtCurrency(r['Adjusted Revenue'])]);
  const totalRev=rows.reduce((a,r)=>a+(parseFloat(String(r[5]).replace(/[$,]/g,''))||0),0);
  openDrawer('Product',name,[{l:'Revenue',v:fmtCurrency(totalRev)},{l:'Orders',v:String(rows.length)}],['Order','Date','Customer','Variant','Qty','Revenue'],rows);
}

function openCategoryDrawer(cat){
  const yr=window._state.cm.getFullYear();
  const catRows=ORDERS.filter(r=>r['Merch Bucket']===cat&&r['Product Category']==='Merchandise'&&(parseDate(r['Created At'])||new Date(0)).getFullYear()===yr);
  const prodMap={};
  catRows.forEach(r=>{const n=r['Line Item Title'],v=parseFloat(String(r['Adjusted Revenue']).replace(/[$,]/g,''))||0,q=parseInt(r['Quantity'])||0;if(n){if(!prodMap[n])prodMap[n]={rev:0,units:0};prodMap[n].rev+=v;prodMap[n].units+=q;}});
  const rows=Object.entries(prodMap).sort((a,b)=>b[1].rev-a[1].rev).map(([n,v])=>[n,fmtCurrency(v.rev),String(v.units)]);
  const catRev=catRows.reduce((a,r)=>a+(parseFloat(String(r['Adjusted Revenue']).replace(/[$,]/g,''))||0),0);
  openDrawer('Category',cat,[{l:'Revenue',v:fmtCurrency(catRev)},{l:'Products',v:String(rows.length)}],['Product','Revenue','Units'],rows);
}
</script>
</body>
</html>
